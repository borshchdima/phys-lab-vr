<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PhysLab VR - Catapult</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/donmccurdy/aframe-physics-system/v4.0.1/dist/aframe-physics-system.min.js"></script>
    
    <style>
        #controls { position: absolute; top: 10px; right: 10px; z-index: 10; }
        #data-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 8px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="data-panel">
        <h3>Параметри польоту</h3>
        <div id="val-height">Висота: 0</div>
        <div id="val-velocity">Швидкість: 0</div>
    </div>

    <div id="controls">
        <button onclick="launchBall()" style="padding: 20px; font-size: 18px; cursor: pointer;">Вистрілити (Катапульта)</button>
    </div>

    <a-scene physics="debug: true">
        <a-sphere id="ball" dynamic-body="mass: 1" position="0 0.5 -2" radius="0.3" color="red"></a-sphere>
        
        <a-entity id="trajectory" line="color: yellow; opacity: 0.7"></a-entity>
        
        <a-plane static-body rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        const ball = document.querySelector('#ball');
        const trajectory = document.querySelector('#trajectory');
        let points = [];

        // Функція "Катапульта" - додає імпульс
        function launchBall() {
            ball.body.position.set(0, 0.5, -2); // Повертаємо на позицію
            ball.body.velocity.set(0, 0, 0);    // Скидаємо швидкість
            // Імпульс вгору та вперед (симуляція катапульти)
            ball.body.applyImpulse({x: 0, y: 10, z: -15}, {x: 0, y: 0, z: 0});
            points = []; // Очистити лінію
        }

        function update() {
            const pos = ball.body.position;
            
            // Оновлення таблиці
            document.querySelector('#val-height').textContent = "Висота: " + pos.y.toFixed(2) + " м";
            const vel = ball.body.velocity;
            const speed = Math.sqrt(vel.x**2 + vel.y**2 + vel.z**2);
            document.querySelector('#val-velocity').textContent = "Швидкість: " + speed.toFixed(2) + " м/с";

            // Оновлення лінії траєкторії (записуємо кожні 10 кадрів)
            if (pos.y > 0) {
                points.push(`${pos.x} ${pos.y} ${pos.z}`);
                if (points.length > 50) points.shift(); // Обмежуємо довжину лінії
                trajectory.setAttribute('line', 'start', points[0]);
                trajectory.setAttribute('line', 'end', points[points.length-1]);
            }
            requestAnimationFrame(update);
        }
        
        requestAnimationFrame(update);
    </script>
</body>
</html>
