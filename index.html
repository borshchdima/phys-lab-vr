<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PhysLab VR - Live Chart</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/donmccurdy/aframe-physics-system/v4.0.1/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; background: white; padding: 10px; border-radius: 8px; }
        canvas { width: 300px !important; height: 150px !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button onclick="launchBall()">Запустити кулю</button>
        <canvas id="heightChart"></canvas>
    </div>

    <a-scene physics="debug: true">
        <a-sphere id="ball" dynamic-body="mass: 1" position="0 0.5 -2" radius="0.3" color="red"></a-sphere>
        <a-plane static-body rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        // Ініціалізація графіка
        const ctx = document.getElementById('heightChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Висота (м)', data: [], borderColor: 'red' }] },
            options: { animation: false, scales: { y: { beginAtZero: true } } }
        });

        const ball = document.querySelector('#ball');
        let counter = 0;

        function launchBall() {
            ball.body.position.set(0, 0.5, -2);
            ball.body.velocity.set(0, 0, 0);
            ball.body.applyImpulse({x: 0, y: 8, z: -10}, {x: 0, y: 0, z: 0});
            chart.data.labels = []; chart.data.datasets[0].data = []; // Очистка
        }

        function update() {
            if (ball.body) {
                const h = ball.body.position.y;
                chart.data.labels.push(counter++);
                chart.data.datasets[0].data.push(h);
                if (chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.update();
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
